services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cine-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: cine-api
    environment:
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_NAME: "${DB_NAME}"
      DB_USER: sa
      DB_PASSWORD: "${DB_SA_PASSWORD}"
      JWT_SECRET: "${JWT_SECRET}"
      RESERVATION_HOLD_MINUTES: "${RESERVATION_HOLD_MINUTES}"
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./api:/app

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: cine-front
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqlserver_data:

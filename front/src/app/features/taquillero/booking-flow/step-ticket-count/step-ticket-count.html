<h2>¿Cuántos boletos?</h2>

<div class="counter">
  <button class="btn btn--icon" type="button" (click)="decrement()" aria-label="Restar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
      <path d="M5 12h14" />
    </svg>
  </button>
  <span class="count">{{ count() }}</span>
  <button class="btn btn--icon" type="button" (click)="increment()">+</button>
</div>

<button class="btn btn--primary" type="button" (click)="confirm()">Continuar</button>

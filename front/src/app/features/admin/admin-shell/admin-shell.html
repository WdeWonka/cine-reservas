<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-brand">Cine Reservas</div>
    <nav class="sidebar-nav">
      <a routerLink="/admin/movies" routerLinkActive="active">Películas</a>
      <a routerLink="/admin/rooms" routerLinkActive="active">Salas</a>
      <a routerLink="/admin/movie-functions" routerLinkActive="active">Funciones</a>
      <a routerLink="/admin/reservations" routerLinkActive="active">Reservas</a>
    </nav>
    <div class="sidebar-footer">
      <a routerLink="/scan">Escanear ticket</a>
      <span class="username">{{ currentUser()?.username }}</span>
      <button class="btn btn--secondary" (click)="logout()">Cerrar sesión</button>
    </div>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>

<div class="login-page">
  <form class="login-card card" (ngSubmit)="submit()">
    <h1>Cine Reservas</h1>
    <p class="subtitle">Ingresá con tu usuario</p>

    <div class="field">
      <label for="username">Usuario</label>
      <input
        id="username"
        name="username"
        [(ngModel)]="username"
        autocomplete="username"
        required
      />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input
        id="password"
        name="password"
        type="password"
        [(ngModel)]="password"
        autocomplete="current-password"
        required
      />
    </div>

    <button class="btn btn--primary login-submit" type="submit" [disabled]="loading()">
      {{ loading() ? 'Ingresando…' : 'Ingresar' }}
    </button>
  </form>
</div>
